<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Práctica de tablas de multiplicar</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      color: #172033;
      background:
        radial-gradient(circle at top left, rgba(255, 255, 255, 0.85), transparent 32%),
        linear-gradient(135deg, #7c3aed, #2563eb 45%, #06b6d4);
    }

    .contenedor {
      width: 100%;
      max-width: 820px;
      background: rgba(255, 255, 255, 0.94);
      border: 1px solid rgba(255, 255, 255, 0.65);
      border-radius: 28px;
      padding: 34px;
      box-shadow: 0 24px 60px rgba(15, 23, 42, 0.28);
      text-align: center;
      backdrop-filter: blur(14px);
    }

    h1 {
      margin-bottom: 12px;
      color: #312e81;
      font-size: clamp(2rem, 5vw, 3.2rem);
      letter-spacing: -1px;
    }

    h1::after {
      content: ' ✨';
    }

    p {
      margin-bottom: 15px;
      line-height: 1.5;
      color: #475569;
    }

    .pantalla {
      display: none;
      animation: aparecer 0.35s ease;
    }

    .pantalla.activa {
      display: block;
    }

    @keyframes aparecer {
      from {
        opacity: 0;
        transform: translateY(12px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .tablas {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(82px, 1fr));
      gap: 14px;
      margin: 28px 0;
    }

    .tabla-opcion {
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 78px;
      border: 2px solid #dbeafe;
      border-radius: 20px;
      cursor: pointer;
      background: linear-gradient(180deg, #ffffff, #eff6ff);
      transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s, background 0.2s;
      font-size: 2rem;
      font-weight: 900;
      color: #1d4ed8;
      box-shadow: 0 10px 22px rgba(37, 99, 235, 0.12);
      user-select: none;
    }

    .tabla-opcion:hover {
      border-color: #60a5fa;
      transform: translateY(-4px) scale(1.02);
      box-shadow: 0 16px 30px rgba(37, 99, 235, 0.2);
    }

    .tabla-opcion input {
      position: absolute;
      opacity: 0;
      pointer-events: none;
    }

    .tabla-opcion:has(input:checked) {
      background: linear-gradient(135deg, #2563eb, #7c3aed);
      color: white;
      border-color: white;
      box-shadow: 0 18px 35px rgba(79, 70, 229, 0.38);
      transform: translateY(-3px);
    }

    button {
      border: none;
      border-radius: 999px;
      padding: 14px 26px;
      font-size: 1rem;
      cursor: pointer;
      background: linear-gradient(135deg, #f97316, #ec4899);
      color: white;
      font-weight: 800;
      transition: transform 0.2s, box-shadow 0.2s, filter 0.2s;
      margin: 6px;
      box-shadow: 0 12px 25px rgba(236, 72, 153, 0.25);
    }

    button:hover {
      transform: translateY(-2px);
      filter: brightness(1.04);
      box-shadow: 0 16px 30px rgba(236, 72, 153, 0.33);
    }

    button:disabled {
      opacity: 0.7;
      cursor: not-allowed;
      transform: none;
    }

    .acciones-inicio {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 10px;
    }

    .btn-sin-tiempo {
      background: linear-gradient(135deg, #2563eb, #7c3aed);
      box-shadow: 0 12px 25px rgba(79, 70, 229, 0.25);
    }

    .btn-con-tiempo {
      background: linear-gradient(135deg, #f97316, #ec4899);
    }

    .btn-microfono {
      background: linear-gradient(135deg, #16a34a, #22c55e);
      box-shadow: 0 12px 25px rgba(34, 197, 94, 0.25);
    }

    .btn-microfono.escuchando {
      background: linear-gradient(135deg, #dc2626, #f97316);
      animation: latido 0.8s infinite alternate;
    }

    .btn-microfono.activado {
      background: linear-gradient(135deg, #0f766e, #14b8a6);
    }

    .btn-terminar {
      display: block;
      width: fit-content;
      margin: 28px auto 0;
      background: linear-gradient(135deg, #475569, #0f172a);
      box-shadow: 0 12px 25px rgba(15, 23, 42, 0.22);
    }

    @keyframes latido {
      from {
        transform: scale(1);
      }

      to {
        transform: scale(1.06);
      }
    }

    .mensaje-error {
      color: #dc2626;
      font-weight: bold;
      min-height: 24px;
    }

    .zona-superior-juego {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 14px;
      margin-bottom: 24px;
    }

    .progreso {
      justify-self: start;
      display: inline-block;
      color: #475569;
      font-weight: 800;
      background: #e0f2fe;
      padding: 8px 16px;
      border-radius: 999px;
    }

    .temporizador {
      justify-self: center;
      display: none;
      min-width: 88px;
      color: white;
      font-weight: 900;
      font-size: 1.45rem;
      background: linear-gradient(135deg, #ef4444, #f97316);
      padding: 10px 18px;
      border-radius: 999px;
      box-shadow: 0 12px 24px rgba(239, 68, 68, 0.22);
    }

    .temporizador.activo {
      display: inline-block;
    }

    .temporizador.peligro {
      animation: latido 0.45s infinite alternate;
    }

    .marcador {
      justify-self: end;
      display: grid;
      grid-template-columns: repeat(2, auto);
      gap: 10px;
      font-size: 1rem;
      font-weight: bold;
    }

    .marcador > div {
      border-radius: 18px;
      padding: 12px 14px;
      background: #f8fafc;
      box-shadow: inset 0 0 0 1px #e2e8f0;
    }

    .aciertos {
      color: #16a34a;
    }

    .fallos {
      color: #dc2626;
    }

    .zona-pregunta {
      margin: 20px 0 24px;
    }

    .pregunta {
      display: inline-block;
      font-size: clamp(4.2rem, 11vw, 7.5rem);
      font-weight: 950;
      color: #312e81;
      margin: 18px 0 24px;
      padding: 28px 40px;
      border-radius: 34px;
      background: linear-gradient(180deg, #ffffff, #eef2ff);
      box-shadow: 0 22px 44px rgba(49, 46, 129, 0.2);
      letter-spacing: -2px;
    }

    .formulario-respuesta {
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }

    input[type="number"] {
      width: 170px;
      padding: 14px;
      font-size: 1.4rem;
      border: 3px solid #bfdbfe;
      border-radius: 16px;
      text-align: center;
      font-weight: 800;
      color: #1e3a8a;
      background: #f8fafc;
    }

    input[type="number"]:focus {
      outline: none;
      border-color: #7c3aed;
      box-shadow: 0 0 0 4px rgba(124, 58, 237, 0.12);
      background: white;
    }

    .ayuda-voz {
      min-height: 28px;
      margin-bottom: 16px;
      color: #475569;
      font-weight: 700;
    }

    .feedback {
      min-height: 38px;
      font-size: 1.25rem;
      font-weight: 900;
      margin-bottom: 10px;
    }

    .feedback.correcto {
      color: #16a34a;
    }

    .feedback.incorrecto {
      color: #dc2626;
    }

    .racha {
      min-height: 44px;
      color: #b45309;
      font-size: 1.45rem;
      font-weight: 900;
      margin-top: 12px;
    }

    .racha:not(:empty) {
      display: inline-block;
      padding: 12px 18px;
      border-radius: 999px;
      background: #fef3c7;
      box-shadow: 0 10px 24px rgba(217, 119, 6, 0.18);
      animation: impulso 0.55s ease;
    }

    @keyframes impulso {
      0% {
        transform: scale(0.8);
        opacity: 0;
      }

      70% {
        transform: scale(1.08);
        opacity: 1;
      }

      100% {
        transform: scale(1);
      }
    }

    .resultado-final {
      font-size: 1.3rem;
      margin: 20px 0;
    }

    .resumen-final {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 18px;
      margin: 24px 0;
    }

    .tarjeta-final {
      border-radius: 24px;
      padding: 24px;
      background: #f8fafc;
      box-shadow: inset 0 0 0 1px #e2e8f0;
    }

    .tarjeta-final strong {
      display: block;
      font-size: 3rem;
      margin-top: 8px;
    }

    #pantallaFinal .aciertos,
    #pantallaFinal .fallos {
      font-size: 1.4rem;
      font-weight: 900;
    }

    @media (max-width: 700px) {
      .zona-superior-juego {
        grid-template-columns: 1fr;
      }

      .progreso,
      .temporizador,
      .marcador {
        justify-self: center;
      }
    }

    @media (max-width: 500px) {
      .contenedor {
        padding: 22px;
        border-radius: 22px;
      }

      .tablas {
        grid-template-columns: repeat(2, 1fr);
      }

      .formulario-respuesta input,
      .formulario-respuesta button,
      .acciones-inicio button {
        width: 100%;
      }

      .pregunta {
        font-size: clamp(3.2rem, 15vw, 4.8rem);
        padding: 20px;
      }

      .marcador,
      .resumen-final {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="contenedor">
    <section id="pantallaInicio" class="pantalla activa">
      <h1>Tablas de multiplicar</h1>
      <p>Selecciona las tablas que quieres practicar. Después responderás 30 multiplicaciones aleatorias.</p>

      <div id="tablas" class="tablas"></div>

      <p id="mensajeError" class="mensaje-error"></p>

      <div class="acciones-inicio">
        <button id="btnEmpezarSinTiempo" class="btn-sin-tiempo">Empezar sin tiempo</button>
        <button id="btnEmpezarConTiempo" class="btn-con-tiempo">Empezar con tiempo</button>
      </div>
    </section>

    <section id="pantallaJuego" class="pantalla">
      <div class="zona-superior-juego">
        <div class="progreso">Pregunta <span id="numeroPregunta">1</span> de 30</div>
        <div id="temporizador" class="temporizador">10</div>
        <div class="marcador">
          <div class="aciertos">Aciertos: <span id="aciertos">0</span></div>
          <div class="fallos">Fallos: <span id="fallos">0</span></div>
        </div>
      </div>

      <div class="zona-pregunta">
        <div id="pregunta" class="pregunta"></div>
      </div>

      <form id="formularioRespuesta" class="formulario-respuesta">
        <input id="respuesta" type="number" inputmode="numeric" pattern="[0-9]*" autocomplete="off" placeholder="Resultado" />
        <button id="btnResponder" type="submit">Responder</button>
        <button id="btnMicrofono" class="btn-microfono" type="button">🎤 Activar voz automática</button>
      </form>

      <div id="ayudaVoz" class="ayuda-voz"></div>
      <div id="feedback" class="feedback"></div>
      <div id="mensajeRacha" class="racha"></div>

      <button id="btnTerminar" class="btn-terminar" type="button">Terminar prueba</button>
    </section>

    <section id="pantallaFinal" class="pantalla">
      <h1>Práctica finalizada</h1>
      <p id="mensajeFinal" class="resultado-final">Has terminado la práctica.</p>

      <div class="resumen-final">
        <div class="tarjeta-final aciertos">Aciertos <strong id="aciertosFinales">0</strong></div>
        <div class="tarjeta-final fallos">Fallos <strong id="fallosFinales">0</strong></div>
      </div>

      <button id="btnReiniciar">Practicar otra vez</button>
    </section>
  </main>

  <script>
    const TOTAL_PREGUNTAS = 30;
    const SEGUNDOS_POR_PREGUNTA = 10;
    const TIEMPO_CORRECTO = 900;
    const TIEMPO_INCORRECTO = 2900;
    const TIEMPO_ANTES_DE_ESCUCHAR = 700;

    const pantallaInicio = document.getElementById('pantallaInicio');
    const pantallaJuego = document.getElementById('pantallaJuego');
    const pantallaFinal = document.getElementById('pantallaFinal');

    const contenedorTablas = document.getElementById('tablas');
    const mensajeError = document.getElementById('mensajeError');
    const btnEmpezarSinTiempo = document.getElementById('btnEmpezarSinTiempo');
    const btnEmpezarConTiempo = document.getElementById('btnEmpezarConTiempo');
    const btnReiniciar = document.getElementById('btnReiniciar');
    const btnTerminar = document.getElementById('btnTerminar');
    const btnResponder = document.getElementById('btnResponder');
    const btnMicrofono = document.getElementById('btnMicrofono');

    const spanAciertos = document.getElementById('aciertos');
    const spanFallos = document.getElementById('fallos');
    const spanNumeroPregunta = document.getElementById('numeroPregunta');
    const divTemporizador = document.getElementById('temporizador');
    const divPregunta = document.getElementById('pregunta');
    const formularioRespuesta = document.getElementById('formularioRespuesta');
    const inputRespuesta = document.getElementById('respuesta');
    const ayudaVoz = document.getElementById('ayudaVoz');
    const divFeedback = document.getElementById('feedback');
    const divMensajeRacha = document.getElementById('mensajeRacha');
    const mensajeFinal = document.getElementById('mensajeFinal');
    const aciertosFinales = document.getElementById('aciertosFinales');
    const fallosFinales = document.getElementById('fallosFinales');

    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    let reconocimientoVoz = null;

    let tablasSeleccionadas = [];
    let preguntaActual = 1;
    let aciertos = 0;
    let fallos = 0;
    let aciertosSeguidos = 0;
    let factor1 = 0;
    let factor2 = 0;
    let respuestaCorrecta = 0;
    let esperandoSiguientePregunta = false;
    let escuchando = false;
    let vozAutomaticaActivada = false;
    let temporizadorEscucha = null;
    let modoConTiempo = false;
    let segundosRestantes = SEGUNDOS_POR_PREGUNTA;
    let intervaloTemporizador = null;
    let temporizadorPreguntaAgotado = false;

    crearSelectorTablas();
    prepararReconocimientoVoz();

    btnEmpezarSinTiempo.addEventListener('click', () => iniciarJuego(false));
    btnEmpezarConTiempo.addEventListener('click', () => iniciarJuego(true));
    btnReiniciar.addEventListener('click', reiniciarAplicacion);
    btnTerminar.addEventListener('click', terminarPruebaManualmente);
    btnMicrofono.addEventListener('click', activarVozAutomatica);
    formularioRespuesta.addEventListener('submit', comprobarRespuesta);

    function crearSelectorTablas() {
      for (let i = 1; i <= 10; i++) {
        const label = document.createElement('label');
        label.className = 'tabla-opcion';

        const checkbox = document.createElement('input');
        checkbox.type = 'checkbox';
        checkbox.value = i;

        label.appendChild(checkbox);
        label.append(i);
        contenedorTablas.appendChild(label);
      }
    }

    function prepararReconocimientoVoz() {
      if (!SpeechRecognition) {
        btnMicrofono.disabled = true;
        ayudaVoz.textContent = 'El reconocimiento de voz no está disponible en este navegador.';
        return;
      }

      reconocimientoVoz = new SpeechRecognition();
      reconocimientoVoz.lang = 'es-ES';
      reconocimientoVoz.continuous = false;
      reconocimientoVoz.interimResults = false;
      reconocimientoVoz.maxAlternatives = 5;

      reconocimientoVoz.addEventListener('start', () => {
        escuchando = true;
        btnMicrofono.classList.add('escuchando');
        btnMicrofono.textContent = '🎙️ Escuchando...';
        ayudaVoz.textContent = 'Di solo el número de la respuesta. Por ejemplo: veinticuatro.';
      });

      reconocimientoVoz.addEventListener('result', (evento) => {
        const resultado = obtenerNumeroReconocido(evento);

        ayudaVoz.textContent = `Has dicho: ${resultado.textoMostrado}`;

        if (resultado.numero === null) {
          divFeedback.textContent = 'No he podido entender el número. Inténtalo otra vez.';
          divFeedback.className = 'feedback incorrecto';
          escucharAutomaticamenteTrasError();
          return;
        }

        inputRespuesta.value = resultado.numero;
        comprobarRespuesta(new Event('submit'));
      });

      reconocimientoVoz.addEventListener('end', () => {
        escuchando = false;
        btnMicrofono.classList.remove('escuchando');
        actualizarBotonMicrofono();
      });

      reconocimientoVoz.addEventListener('error', (evento) => {
        escuchando = false;
        btnMicrofono.classList.remove('escuchando');
        actualizarBotonMicrofono();
        mostrarErrorReconocimientoVoz(evento.error);
      });
    }

    function iniciarJuego(conTiempo) {
      tablasSeleccionadas = obtenerTablasSeleccionadas();

      if (tablasSeleccionadas.length === 0) {
        mensajeError.textContent = 'Debes seleccionar al menos una tabla.';
        return;
      }

      mensajeError.textContent = '';
      preguntaActual = 1;
      aciertos = 0;
      fallos = 0;
      aciertosSeguidos = 0;
      esperandoSiguientePregunta = false;
      vozAutomaticaActivada = false;
      modoConTiempo = conTiempo;
      temporizadorPreguntaAgotado = false;
      cancelarEscuchaProgramada();
      detenerTemporizadorPregunta();
      actualizarBotonMicrofono();

      divTemporizador.classList.toggle('activo', modoConTiempo);
      divTemporizador.classList.remove('peligro');
      divTemporizador.textContent = SEGUNDOS_POR_PREGUNTA;

      actualizarMarcador();
      cambiarPantalla(pantallaJuego);
      generarPregunta();
    }

    function obtenerTablasSeleccionadas() {
      const checkboxes = document.querySelectorAll('#tablas input:checked');
      return Array.from(checkboxes).map(checkbox => Number(checkbox.value));
    }

    function generarPregunta() {
      esperandoSiguientePregunta = false;
      temporizadorPreguntaAgotado = false;
      btnResponder.disabled = false;
      inputRespuesta.disabled = false;
      btnTerminar.disabled = false;
      btnMicrofono.disabled = !SpeechRecognition;
      actualizarBotonMicrofono();

      factor1 = tablasSeleccionadas[Math.floor(Math.random() * tablasSeleccionadas.length)];
      factor2 = Math.floor(Math.random() * 10) + 1;
      respuestaCorrecta = factor1 * factor2;

      spanNumeroPregunta.textContent = preguntaActual;
      divPregunta.textContent = `${factor1} × ${factor2} = ?`;
      inputRespuesta.value = '';
      if (!esDispositivoMovil()) {
        inputRespuesta.focus();
      }
      ayudaVoz.textContent = SpeechRecognition
        ? 'Puedes escribir la respuesta o activar la voz automática una sola vez.'
        : 'El reconocimiento de voz no está disponible en este navegador.';
      divFeedback.textContent = '';
      divFeedback.className = 'feedback';

      if (modoConTiempo) {
        iniciarTemporizadorPregunta();
      }

      if (vozAutomaticaActivada) {
        programarEscuchaAutomatica();
      }
    }

    function comprobarRespuesta(evento) {
      evento.preventDefault();

      if (esperandoSiguientePregunta) {
        return;
      }

      const respuestaUsuario = Number(inputRespuesta.value);

      if (inputRespuesta.value.trim() === '') {
        divFeedback.textContent = 'Escribe o di una respuesta antes de continuar.';
        divFeedback.className = 'feedback incorrecto';
        return;
      }

      resolverPregunta(respuestaUsuario === respuestaCorrecta, false);
    }

    function resolverPregunta(esCorrecta, porTiempoAgotado) {
      esperandoSiguientePregunta = true;
      cancelarEscuchaProgramada();
      detenerEscuchaSiEstaActiva();
      detenerTemporizadorPregunta();
      btnResponder.disabled = true;
      inputRespuesta.disabled = true;
      btnMicrofono.disabled = true;

      let tiempoEspera = TIEMPO_CORRECTO;

      if (esCorrecta) {
        aciertos++;
        aciertosSeguidos++;
        divFeedback.textContent = '¡Correcto!';
        divFeedback.className = 'feedback correcto';
        comprobarRacha();
      } else {
        fallos++;
        aciertosSeguidos = 0;
        tiempoEspera = TIEMPO_INCORRECTO;
        divFeedback.textContent = porTiempoAgotado
          ? `Tiempo agotado. La respuesta correcta era ${respuestaCorrecta}.`
          : `Incorrecto. La respuesta correcta era ${respuestaCorrecta}.`;
        divFeedback.className = 'feedback incorrecto';
        divMensajeRacha.textContent = '';
      }

      actualizarMarcador();

      if (preguntaActual === TOTAL_PREGUNTAS) {
        setTimeout(() => mostrarResultadoFinal('Has llegado al final de las 30 preguntas.'), tiempoEspera);
      } else {
        preguntaActual++;
        setTimeout(generarPregunta, tiempoEspera);
      }
    }

    function iniciarTemporizadorPregunta() {
      detenerTemporizadorPregunta();
      segundosRestantes = SEGUNDOS_POR_PREGUNTA;
      divTemporizador.textContent = segundosRestantes;
      divTemporizador.classList.add('activo');
      divTemporizador.classList.remove('peligro');

      intervaloTemporizador = setInterval(() => {
        segundosRestantes--;
        divTemporizador.textContent = segundosRestantes;

        if (segundosRestantes <= 3) {
          divTemporizador.classList.add('peligro');
        }

        if (segundosRestantes <= 0) {
          temporizadorPreguntaAgotado = true;
          resolverPregunta(false, true);
        }
      }, 1000);
    }

    function detenerTemporizadorPregunta() {
      if (intervaloTemporizador !== null) {
        clearInterval(intervaloTemporizador);
        intervaloTemporizador = null;
      }
      divTemporizador.classList.remove('peligro');
    }

    function terminarPruebaManualmente() {
      mostrarResultadoFinal('Has terminado la práctica manualmente.');
    }

    function activarVozAutomatica() {
      if (!reconocimientoVoz || esperandoSiguientePregunta) {
        return;
      }

      vozAutomaticaActivada = true;
      actualizarBotonMicrofono();
      divFeedback.textContent = '';
      divFeedback.className = 'feedback';
      escucharRespuesta();
    }

    function escucharRespuesta() {
      if (!reconocimientoVoz || esperandoSiguientePregunta || escuchando) {
        return;
      }

      try {
        reconocimientoVoz.start();
      } catch (error) {
        ayudaVoz.textContent = 'El micrófono ya se está iniciando. Espera un momento.';
      }
    }

    function programarEscuchaAutomatica() {
      cancelarEscuchaProgramada();
      temporizadorEscucha = setTimeout(() => {
        escucharRespuesta();
      }, TIEMPO_ANTES_DE_ESCUCHAR);
    }

    function escucharAutomaticamenteTrasError() {
      if (!vozAutomaticaActivada || esperandoSiguientePregunta) {
        return;
      }

      cancelarEscuchaProgramada();
      temporizadorEscucha = setTimeout(() => {
        escucharRespuesta();
      }, 1200);
    }

    function cancelarEscuchaProgramada() {
      if (temporizadorEscucha !== null) {
        clearTimeout(temporizadorEscucha);
        temporizadorEscucha = null;
      }
    }

    function detenerEscuchaSiEstaActiva() {
      if (reconocimientoVoz && escuchando) {
        reconocimientoVoz.stop();
      }
    }

    function actualizarBotonMicrofono() {
      if (!SpeechRecognition) {
        btnMicrofono.textContent = '🎤 Voz no disponible';
        return;
      }

      if (escuchando) {
        btnMicrofono.textContent = '🎙️ Escuchando...';
        return;
      }

      if (vozAutomaticaActivada) {
        btnMicrofono.textContent = '✅ Voz automática activada';
        btnMicrofono.classList.add('activado');
      } else {
        btnMicrofono.textContent = '🎤 Activar voz automática';
        btnMicrofono.classList.remove('activado');
      }
    }

    function obtenerNumeroReconocido(evento) {
      const alternativas = Array.from(evento.results[0]).map(alternativa => alternativa.transcript);

      for (const texto of alternativas) {
        const numero = convertirTextoANumero(texto);
        if (numero !== null) {
          return {
            numero,
            textoMostrado: texto
          };
        }
      }

      return {
        numero: null,
        textoMostrado: alternativas.join(' / ')
      };
    }

    function mostrarErrorReconocimientoVoz(error) {
      const mensajes = {
        'not-allowed': 'El navegador no tiene permiso para usar el micrófono. Revisa los permisos del sitio.',
        'service-not-allowed': 'El navegador ha bloqueado el servicio de reconocimiento de voz.',
        'audio-capture': 'No se ha encontrado ningún micrófono disponible.',
        'no-speech': 'No he detectado voz. Acerca el móvil y vuelve a intentarlo.',
        'network': 'El reconocimiento de voz necesita conexión a Internet y ha fallado la red.',
        'language-not-supported': 'El idioma español no está disponible para el reconocimiento de voz en este dispositivo.'
      };

      ayudaVoz.textContent = mensajes[error] || `No se ha podido usar el micrófono. Error: ${error}`;

      if (error === 'no-speech') {
        escucharAutomaticamenteTrasError();
      }
    }

    function esDispositivoMovil() {
      return /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
    }

    function convertirTextoANumero(texto) {
      const textoLimpio = texto
        .toLowerCase()
        .trim()
        .replaceAll('.', '')
        .replaceAll(',', '')
        .replaceAll('á', 'a')
        .replaceAll('é', 'e')
        .replaceAll('í', 'i')
        .replaceAll('ó', 'o')
        .replaceAll('ú', 'u');

      const numeroDirecto = parseInt(textoLimpio, 10);
      if (!Number.isNaN(numeroDirecto)) {
        return numeroDirecto;
      }

      const numeros = {
        'cero': 0,
        'uno': 1,
        'una': 1,
        'dos': 2,
        'tres': 3,
        'cuatro': 4,
        'cinco': 5,
        'seis': 6,
        'siete': 7,
        'ocho': 8,
        'nueve': 9,
        'diez': 10,
        'once': 11,
        'doce': 12,
        'trece': 13,
        'catorce': 14,
        'quince': 15,
        'dieciseis': 16,
        'diecisiete': 17,
        'dieciocho': 18,
        'diecinueve': 19,
        'veinte': 20,
        'veintiuno': 21,
        'veintidos': 22,
        'veintitres': 23,
        'veinticuatro': 24,
        'veinticinco': 25,
        'veintiseis': 26,
        'veintisiete': 27,
        'veintiocho': 28,
        'veintinueve': 29,
        'treinta': 30,
        'cuarenta': 40,
        'cincuenta': 50,
        'sesenta': 60,
        'setenta': 70,
        'ochenta': 80,
        'noventa': 90,
        'cien': 100
      };

      if (numeros[textoLimpio] !== undefined) {
        return numeros[textoLimpio];
      }

      const partes = textoLimpio.split(' y ');
      if (partes.length === 2 && numeros[partes[0]] !== undefined && numeros[partes[1]] !== undefined) {
        return numeros[partes[0]] + numeros[partes[1]];
      }

      return null;
    }

    function comprobarRacha() {
      if (aciertosSeguidos >= 5 && aciertosSeguidos % 5 === 0) {
        divMensajeRacha.textContent = `🚀 Racha de ${aciertosSeguidos} aciertos`;
      }
    }

    function actualizarMarcador() {
      spanAciertos.textContent = aciertos;
      spanFallos.textContent = fallos;
    }

    function mostrarResultadoFinal(mensaje) {
      cancelarEscuchaProgramada();
      detenerEscuchaSiEstaActiva();
      detenerTemporizadorPregunta();
      esperandoSiguientePregunta = true;
      btnTerminar.disabled = true;
      mensajeFinal.textContent = mensaje;
      aciertosFinales.textContent = aciertos;
      fallosFinales.textContent = fallos;
      cambiarPantalla(pantallaFinal);
    }

    function reiniciarAplicacion() {
      cancelarEscuchaProgramada();
      detenerEscuchaSiEstaActiva();
      detenerTemporizadorPregunta();
      vozAutomaticaActivada = false;
      modoConTiempo = false;
      actualizarBotonMicrofono();
      cambiarPantalla(pantallaInicio);
      mensajeError.textContent = '';
      divMensajeRacha.textContent = '';
      ayudaVoz.textContent = '';
    }

    function cambiarPantalla(pantallaVisible) {
      pantallaInicio.classList.remove('activa');
      pantallaJuego.classList.remove('activa');
      pantallaFinal.classList.remove('activa');
      pantallaVisible.classList.add('activa');
    }
  </script>
</body>
</html>
